# Do Azure Portal tạo khi liên kết repo với Static Web App. Chỉ giữ workflow này cho frontend SWA
# (tránh chạy song song với workflow deploy trùng tên khác).
# Secret token: Azure thường thêm tên dạng AZURE_STATIC_WEB_APPS_API_TOKEN_<RESOURCE_NAME>.

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-static-web-apps-brave-bay-03271c700.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set production API URL for CRA build
        run: |
          test -n "${{ secrets.REACT_APP_API_URL }}" || (echo "Add GitHub secret REACT_APP_API_URL (App Service URL, https://....azurewebsites.net)" && exit 1)
          echo "REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}" > frontend/.env.production

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_BAY_03271C700 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./frontend
          api_location: ''
          output_location: build
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_BAY_03271C700 }}
          action: close
