# Deploy React (CRA) to Azure Static Web Apps.
# Prerequisites: create Static Web App in Azure Portal, link GitHub repo (or copy API token).
# GitHub secrets:
#   AZURE_STATIC_WEB_APPS_API_TOKEN — from SWA → Manage deployment token
#   REACT_APP_API_URL — HTTPS base URL of your API (e.g. https://your-api.azurewebsites.net, no trailing slash)

name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-frontend.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # CRA chỉ embed REACT_APP_* lúc build. Ghi .env.production để Oryx chắc chắn nhận biến
      # (một số bản SWA deploy không forward env của step sang npm run build).
      - name: Set production API URL for build
        run: |
          test -n "${{ secrets.REACT_APP_API_URL }}" || (echo "Missing secret REACT_APP_API_URL" && exit 1)
          echo "REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}" > frontend/.env.production

      - name: Build and deploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /frontend
          api_location: ''
          output_location: build
          skip_api_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close SWA preview
    steps:
      - name: Close
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
